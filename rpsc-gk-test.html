<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPSC 2nd Grade GK Mock Test 2026 - Sharma Sir's Digital Lab</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #0d9488;
            --dark: #0f172a;
            --light: #f8fafc;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 10px;
            color: #334155;
            -webkit-user-select: none;
            user-select: none;
        }

        .container {
            max-width: 850px;
            margin: 15px auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 25px 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 25px;
            position: relative;
        }

        .header h1 {
            margin: 0;
            font-size: 22px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* लाइव टाइमर विजेट स्टाइल */
        .timer-badge {
            background: rgba(0, 0, 0, 0.3);
            display: inline-block;
            padding: 8px 15px;
            border-radius: 20px;
            margin-top: 10px;
            font-weight: bold;
            font-size: 15px;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .score-card {
            background: #eff6ff;
            border: 2px dashed #3b82f6;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 25px;
            display: none;
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
        }

        .quiz-box {
            margin-bottom: 25px;
            padding: 20px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: var(--light);
        }

        .question {
            font-size: 16px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        @media (min-width: 600px) {
            .options-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .option-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 14px;
            background: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: #475569;
            transition: all 0.2s;
            font-weight: 500;
        }

        .option-btn:hover:not(:disabled) {
            background: #f1f5f9;
            border-color: #94a3b8;
            color: var(--primary);
        }

        .correct {
            background: #d1fae5 !important;
            border-color: var(--success) !important;
            color: #065f46 !important;
            font-weight: 700;
        }

        .wrong {
            background: #fee2e2 !important;
            border-color: var(--danger) !important;
            color: #991b1b !important;
        }

        .explanation {
            margin-top: 15px;
            padding: 14px;
            background: #e0f2fe;
            border-left: 4px solid #0284c7;
            border-radius: 0 6px 6px 0;
            font-size: 13.5px;
            color: #0369a1;
            display: none;
            line-height: 1.5;
        }

        .submit-btn-container {
            text-align: center;
            margin: 30px 0;
        }

        .submit-main-btn {
            background: linear-gradient(135deg, #b91c1c, #991b1b);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.2s;
        }

        .submit-main-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>SHARMA SIR'S DIGITAL LAB</h1>
        <p>RPSC 2nd Grade Senior Teacher Exam - Paper 1 (100 MCQ)</p>
        <div class="timer-badge">समय शेष: <span id="timer-display">30:00</span></div>
    </div>

    <div id="score-card" class="score-card"></div>

    <div id="quiz-container"></div>

    <div class="submit-btn-container">
        <button id="final-submit-btn" class="submit-main-btn" onclick="submitQuiz()">टेस्ट फाइनल सबमिट करें</button>
    </div>
</div>

<script>
    let timeLeft = 1800; // 30 मिनट (सेकंड में)
    let userScore = 0;
    let totalQuestions = 0;
    let quizData = [];
    let timer;

    // 1. टाइमर फंक्शन शुरू करना
    function startTimer() {
        timer = setInterval(() => {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            
            document.getElementById("timer-display").innerHTML = 
                (minutes < 10 ? "0" : "") + minutes + ":" + (seconds < 10 ? "0" : "") + seconds;
            
            timeLeft--;

            if (timeLeft < 0) {
                clearInterval(timer);
                alert("समय समाप्त हो गया है! आपका टेस्ट स्वतः सबमिट किया जा रहा है।");
                submitQuiz();
            }
        }, 1000);
    }

    // 2. वर्तमान डायरेक्टरी से JSON डेटा लोड करना
    async function loadQuiz() {
        const container = document.getElementById('quiz-container');
        try {
            const response = await fetch('./quiz-data.json');
            if (!response.ok) throw new Error('फ़ाइल नहीं मिली');
            quizData = await response.json();
            totalQuestions = quizData.length;

            quizData.forEach((q, index) => {
                const quizBox = document.createElement('div');
                quizBox.className = 'quiz-box';

                let optionsHTML = '';
                q.options.forEach((opt, oIndex) => {
                    optionsHTML += `<button class="option-btn" data-qindex="${index}" data-oindex="${oIndex}" onclick="selectOption(this, ${index}, ${oIndex}, ${q.correct}, 'exp-${index}')">${String.fromCharCode(65 + oIndex)}. ${opt}</button>`;
                });

                quizBox.innerHTML = `
                    <div class="question">Q${index + 1}. ${q.question}</div>
                    <div class="options-grid">${optionsHTML}</div>
                    <div id="exp-${index}" class="explanation"><strong>व्याख्या:</strong> ${q.explanation}</div>
                `;
                container.appendChild(quizBox);
            });
            
            startTimer(); // डेटा लोड होने के बाद टाइमर शुरू करें
        } catch (error) {
            container.innerHTML = `<div style="color:red; text-align:center; padding:20px; font-weight:bold;">त्रुटि: 'quiz-data.json' फ़ाइल लोड नहीं हो सकी। कृपया सुनिश्चित करें कि रिपोजिटरी में फाइल का नाम सही है।</div>`;
        }
    }

    // 3. ऑप्शन सिलेक्ट करने पर एक्शन
    function selectOption(btn, qIndex, selected, correct, expId) {
        const parent = btn.closest('.options-grid');
        const buttons = parent.querySelectorAll('.option-btn');
        
        // उस प्रश्न के सभी बटन लॉक करें
        buttons.forEach(b => b.disabled = true);

        if (selected === correct) {
            btn.classList.add('correct');
            userScore++;
        } else {
            btn.classList.add('wrong');
            buttons[correct].classList.add('correct');
        }

        // व्याख्या लाइव दिखाएं
        document.getElementById(expId).style.display = 'block';
    }

    // 4. फाइनल सबमिट बटन फंक्शन
    function submitQuiz() {
        clearInterval(timer); // टाइमर रोकें
        
        // स्क्रीन पर सबसे ऊपर स्कोर कार्ड दिखाएं
        const scoreCard = document.getElementById('score-card');
        scoreCard.innerHTML = `आपका कुल स्कोर: ${userScore} / ${totalQuestions} (${((userScore/totalQuestions)*100).toFixed(2)}%)`;
        scoreCard.style.display = 'block';
        
        // पेज को ऊपर स्क्रॉल करें ताकि रिजल्ट दिखे
        window.scrollTo({top: 0, behavior: 'smooth'});

        // सबमिट बटन को डिसेबल करें
        document.getElementById('final-submit-btn').disabled = true;
        document.getElementById('final-submit-btn').innerText = "टेस्ट सबमिट हो चुका है";
        document.getElementById('final-submit-btn').style.background = "#64748b";
        
        // सभी प्रश्नों के बटन लॉक करना (यदि कोई छूट गया हो)
        document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
    }

    window.onload = loadQuiz;
</script>

</body>
</html>
