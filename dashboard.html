<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>My Dashboard | Sharma Sir's Digital Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#FAFAF8;--bg2:#F3F2EF;--surface:#FFFFFF;--border:#E2DDD5;--navy:#1A1F36;--saffron:#E8610A;--saffron-light:#FFF0E8;--green:#0A7D4B;--green-light:#E6F5EE;--text:#1A1F36;--text2:#4A5070;--text3:#8890A8;--shadow:0 2px 16px rgba(26,31,54,0.08);--radius:14px;--radius-lg:20px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans Devanagari','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.navbar{position:sticky;top:0;z-index:200;background:rgba(255,255,255,0.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:760px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:62px}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo{width:38px;height:38px;border-radius:9px;object-fit:cover}
.brand-name{font-weight:800;color:var(--saffron);font-size:14px}
.logout-btn{padding:7px 16px;border-radius:9px;background:var(--bg2);border:1px solid var(--border);font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;font-family:inherit}
.hero{background:linear-gradient(135deg,#1A1F36,#2D3561);text-align:center;padding:40px 20px 30px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 0%,rgba(232,97,10,0.18),transparent)}
.hero h1{font-size:clamp(1.3rem,4vw,1.9rem);font-weight:900;color:#fff;position:relative;z-index:1;margin-bottom:6px}
.hero p{color:rgba(255,255,255,0.6);font-size:13px;position:relative;z-index:1}
.wrap{max-width:760px;margin:0 auto;padding:24px 20px 60px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px;box-shadow:var(--shadow);margin-bottom:18px}
.card h2{font-size:14px;font-weight:800;color:var(--navy);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.info-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.info-row:last-child{border-bottom:none}
.info-label{color:var(--text3)}
.info-value{font-weight:700;color:var(--navy);text-align:right;max-width:60%}
.purchase-item{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;color:var(--navy)}
.purchase-item:last-child{border-bottom:none}
.empty{text-align:center;color:var(--text3);font-size:13px;padding:16px}
.links-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.link-btn{padding:11px 14px;border-radius:11px;background:var(--saffron-light);color:var(--saffron);font-size:13px;font-weight:700;border:1px solid rgba(232,97,10,0.25);text-decoration:none;text-align:center;display:block}
.link-btn.green{background:var(--green-light);color:var(--green);border-color:rgba(10,125,75,0.25)}
</style>
</head>
<body>
<nav class="navbar">
  <div class="nav-inner">
    <a href="https://abhishekchotiya637-create.github.io/Sharmasirdigitallab-/index.html" class="brand">
      <img src="https://abhishekchotiya637-create.github.io/Sharmasirdigitallab-/logo.jpg" class="nav-logo" onerror="this.style.display='none'">
      <div class="brand-name">Sharma Sir's Digital Lab</div>
    </a>
    <button class="logout-btn" id="logoutBtn">Logout</button>
  </div>
</nav>

<div class="hero">
  <h1>👋 नमस्ते, <span id="userName">Student</span>!</h1>
  <p>आपका Account और Purchases यहाँ देखें</p>
</div>

<div class="wrap">
  <div class="card">
    <h2>📋 Account Details</h2>
    <div class="info-row"><span class="info-label">नाम</span><span class="info-value" id="dName">—</span></div>
    <div class="info-row"><span class="info-label">Email</span><span class="info-value" id="dEmail">—</span></div>
    <div class="info-row"><span class="info-label">Mobile</span><span class="info-value" id="dPhone">—</span></div>
    <div class="info-row"><span class="info-label">Login Method</span><span class="info-value" id="dMethod">—</span></div>
  </div>

  <div class="card">
    <h2>🔓 आपके Unlocked Items</h2>
    <div id="purchasesList"><div class="empty">अभी कुछ नहीं खरीदा गया। <a href="./premium-content.html" style="color:var(--saffron);font-weight:700">Premium Zone →</a></div></div>
  </div>

  <div class="card">
    <h2>🚀 Quick Links</h2>
    <div class="links-grid">
      <a href="./premium-content.html" class="link-btn">🔒 Premium Zone</a>
      <a href="https://abhishekchotiya637-create.github.io/Sharmasirdigitallab-/test-series.html" class="link-btn green">🎯 Free Tests</a>
      <a href="https://abhishekchotiya637-create.github.io/Sharmasirdigitallab-/notes.html" class="link-btn green">📝 Free Notes</a>
      <a href="https://t.me/sharmasirdigitallab" class="link-btn">📢 Telegram</a>
    </div>
  </div>
</div>

<script type="module">
import { auth, watchAuthState, logout, getUserData } from './auth.js';

const ITEM_TITLES = {
  "test-premium-rpsc-gk-4": "🎯 RPSC GK Premium Mock #4",
  "test-premium-ssc-cgl-set": "📊 SSC CGL Premium Test Set",
  "notes-cet2026-complete": "📘 CET 2026 Complete Notes (PDF)",
  "notes-current-affairs-2026": "📰 Current Affairs 2026 (PDF)"
};

watchAuthState(async (user) => {
  if (!user) {
    window.location.href = './login.html?redirect=' + encodeURIComponent(window.location.href);
    return;
  }
  document.getElementById('userName').textContent = user.displayName || user.email || 'Student';
  document.getElementById('dName').textContent = user.displayName || '—';
  document.getElementById('dEmail').textContent = user.email || '—';
  document.getElementById('dPhone').textContent = user.phoneNumber || '—';

  const methods = user.providerData.map(p => {
    if (p.providerId === 'google.com') return 'Google';
    if (p.providerId === 'phone') return 'Mobile OTP';
    return 'Email/Password';
  }).join(', ');
  document.getElementById('dMethod').textContent = methods || '—';

  const data = await getUserData(user.uid);
  const purchases = (data && data.purchases) || [];
  const list = document.getElementById('purchasesList');
  if (purchases.length === 0) {
    list.innerHTML = '<div class="empty">अभी कुछ नहीं खरीदा गया। <a href="./premium-content.html" style="color:var(--saffron);font-weight:700">Premium Zone →</a></div>';
  } else {
    list.innerHTML = purchases.map(id =>
      `<div class="purchase-item">✅ ${ITEM_TITLES[id] || id}</div>`
    ).join('');
  }
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await logout();
  window.location.href = 'https://abhishekchotiya637-create.github.io/Sharmasirdigitallab-/index.html';
});
</script>
</body>
</html>
