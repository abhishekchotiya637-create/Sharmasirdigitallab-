<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b1120; --surface: #111827; --surface2: #1a2438;
    --border: rgba(255,255,255,0.08); --orange: #f97316;
    --text: #e2e8f0; --muted: #64748b;
  }
  body { font-family: 'Noto Sans Devanagari', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
  a { text-decoration: none; color: inherit; }

  /* NAV */
  .navbar { position: sticky; top: 0; z-index: 100; background: rgba(11,17,32,0.97); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(249,115,22,0.2); }
  .nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 62px; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .nav-logo { width: 38px; height: 38px; border-radius: 8px; object-fit: cover; }
  .brand-name { font-weight: 800; color: #f97316; font-size: 15px; line-height: 1.2; }
  .brand-sub { font-size: 10px; color: #64748b; }
  .nav-links { display: flex; gap: 4px; list-style: none; align-items: center; }
  .nav-links a { padding: 6px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; color: #94a3b8; transition: all .2s; }
  .nav-links a:hover, .nav-links a.active { color: #f97316; }
  .btn-contact { background: #f97316 !important; color: #fff !important; border-radius: 8px !important; padding: 6px 12px !important; }
  .hamburger { display: none; background: none; border: none; color: #94a3b8; font-size: 22px; cursor: pointer; padding: 4px 8px; }

  /* ── HERO ── */
  .hero {
    text-align: center;
    padding: 52px 20px 40px;
    background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(249,115,22,0.13), transparent);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .hero-label { color: #64748b; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .hero h1 { font-size: clamp(1.6rem, 5vw, 2.8rem); font-weight: 900; color: #fff; margin-bottom: 8px; }
  .hero h1 span { color: #f97316; }
  .hero-sub { color: #64748b; max-width: 520px; margin: 0 auto 32px; font-size: 14px; }

  /* ── PROFILE PHOTO — THE KEY FIX ── */
  .profile-outer {
    width: 190px;
    height: 190px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f97316, #facc15);
    padding: 4px;                    /* orange ring */
    margin: 0 auto 16px;
    display: block;
    box-shadow: 0 0 0 8px rgba(249,115,22,0.12), 0 12px 48px rgba(249,115,22,0.35);
    position: relative;
  }
  .profile-img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;  /* show face from top */
    display: block;
    background: #1a2438;
  }
  .profile-badge {
    position: absolute;
    bottom: 8px; right: 8px;
    width: 38px; height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f97316, #facc15);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    border: 3px solid #0b1120;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  .profile-name { font-size: 22px; font-weight: 900; color: #fff; margin-bottom: 4px; }
  .profile-role { color: #f97316; font-size: 14px; font-weight: 600; margin-bottom: 3px; }
  .profile-tag { color: #64748b; font-size: 13px; margin-bottom: 24px; }

  .socials { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .soc-btn {
    padding: 8px 18px; border-radius: 10px; font-size: 13px; font-weight: 600;
    border: 1px solid rgba(249,115,22,0.3); background: rgba(249,115,22,0.08);
    color: #fb923c; transition: all .2s;
  }
  .soc-btn:hover { background: #f97316; color: #fff; border-color: #f97316; }

  /* STATS */
  .stats-row {
    display: flex; gap: 24px; justify-content: center; flex-wrap: wrap;
    padding: 24px 28px;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px; max-width: 560px; margin: 32px auto 0;
  }
  .stat-item { text-align: center; }
  .stat-val { font-size: 24px; font-weight: 900; color: #f97316; line-height: 1; }
  .stat-label { font-size: 12px; color: #64748b; margin-top: 3px; }

  /* MAIN */
  .main { max-width: 900px; margin: 0 auto; padding: 48px 20px 60px; }
  .sec-tag { font-size: 11px; color: #f97316; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .sec-tag::before { content: ''; display: block; width: 20px; height: 2px; background: #f97316; }
  .sec-h { font-size: clamp(1.1rem, 3vw, 1.6rem); font-weight: 900; color: #fff; margin-bottom: 8px; }
  .sec-h span { color: #f97316; }
  .sec-desc { color: #94a3b8; font-size: 14px; line-height: 1.8; margin-bottom: 8px; }
  .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 40px 0; }

  .grid2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px,1fr)); gap: 16px; margin-top: 20px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; transition: all .2s; }
  .card:hover { border-color: rgba(249,115,22,0.3); transform: translateY(-2px); }
  .card-icon { font-size: 26px; margin-bottom: 10px; }
  .card-title { font-weight: 700; color: #fff; margin-bottom: 3px; font-size: 15px; }
  .card-sub { font-size: 13px; color: #64748b; }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
  .chip { padding: 6px 14px; border-radius: 999px; background: rgba(249,115,22,0.1); border: 1px solid rgba(249,115,22,0.25); color: #fb923c; font-size: 13px; font-weight: 600; }

  .ach-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap: 14px; margin-top: 20px; }
  .ach-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; text-align: center; }
  .ach-icon { font-size: 26px; margin-bottom: 6px; }
  .ach-val { font-size: 22px; font-weight: 900; color: #f97316; }
  .ach-label { font-size: 12px; color: #64748b; margin-top: 3px; }

  .cta-box { background: rgba(249,115,22,0.05); border: 1px solid rgba(249,115,22,0.15); border-radius: 16px; padding: 32px 24px; text-align: center; margin-top: 48px; }
  .cta-title { font-size: 19px; font-weight: 800; color: #fff; margin-bottom: 6px; }
  .cta-desc { color: #64748b; font-size: 14px; margin-bottom: 20px; }
  .btn-p { display: inline-block; padding: 10px 22px; border-radius: 10px; background: #f97316; color: #fff; font-weight: 700; font-size: 14px; margin: 4px; transition: all .2s; }
  .btn-p:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(249,115,22,0.4); }
  .btn-s { display: inline-block; padding: 10px 22px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); color: #e2e8f0; font-weight: 700; font-size: 14px; margin: 4px; transition: all .2s; }
  .btn-s:hover { border-color: #f97316; color: #f97316; }

  /* FOOTER */
  .footer { background: rgba(0,0,0,0.4); border-top: 1px solid rgba(255,255,255,0.06); padding: 32px 20px 18px; text-align: center; }
  .footer-logo { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; margin-bottom: 10px; }
  .footer-brand { font-weight: 800; color: #f97316; font-size: 15px; margin-bottom: 6px; }
  .footer-desc { color: #475569; font-size: 13px; max-width: 480px; margin: 0 auto 16px; }
  .footer-socials { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
  .s-link { padding: 6px 14px; border-radius: 999px; background: rgba(249,115,22,0.08); border: 1px solid rgba(249,115,22,0.2); color: #fb923c; font-size: 13px; font-weight: 600; transition: all .2s; }
  .s-link:hover { background: #f97316; color: #fff; }
  .footer-links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-bottom: 14px; }
  .footer-links a { color: #475569; font-size: 13px; transition: color .2s; }
  .footer-links a:hover { color: #f97316; }
  .footer-copy { color: #334155; font-size: 12px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px; }

  @media(max-width: 700px) {
    .nav-links { display: none; position: absolute; top: 62px; left: 0; right: 0; background: #0b1120; flex-direction: column; padding: 12px 16px; border-bottom: 1px solid rgba(249,115,22,0.2); gap: 4px; align-items: flex-start; }
    .nav-links.open { display: flex; }
    .hamburger { display: block; }
    .profile-outer { width: 160px; height: 160px; }
  }
</style>
